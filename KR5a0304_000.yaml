  text: 漢武帝內傳海四孝武皇帝好長生之術常祭名山大澤以求神仙元封元年甲子祭嵩山起神宫帝齊七日祠訖乃還至四月戊辰帝夜間居承華殿東方朔董仲舒侍忽見一女子著青衣美麗非常帝愕然問之女對曰我墉宫玉女王子登也向為王母所使從昆山來昆山崑崙山也語帝曰聞子輕四海之尊尋道求生降帝王之位而屢禱山嶽勤哉有似可教者也從今百日清齊不間人事不治也至七月七日王母暫來也帝下席跪諾言訖女忽然不知所在帝問東方朔此何人朔曰是西王母紫蘭室玉女常傳使命往來榑桑出入靈州交關常陽傳言玄都阿母昔以出配北燭仙人近又召還使領命録真靈官也帝於是登延靈之臺盛齊存道其四方之事權委於冢宰焉至七月七日乃修除宫掖之內設座殿上以紫羅薦地燔百和之香張雲錦之帳然九光之燈設玉門之棗蒲桃之酒躬監肴物為天官之饌帝乃盛服立于陛下敕端門之內不得妄有窺者內外寂謐靜肅也以俟雲駕至二唱之後即二更也忽天西南如白雲起鬱然直來遙趨宫庭間雲中有簫鼓之聲人馬之響復半食頃王母至也縣投殿前有似鳥集或駕龍虎或乘音乘獅子或御白虎或騎白麟音麟或控白鶴或乘科車羣仙數萬光耀庭宇既至從官不復所在唯見王母乘紫雲之輦駕九色斑龍别有五十天仙側近鸞輿皆身長一丈同執綵毛之節金剛靈璽帶天策咸住殿前王母唯扶二侍女上殿侍女年可十六七服青綾之袿古兮切裾也上服容眸流眄莫見切袤視也作盻非神姿清發真美人也王母上殿東向坐著黃錦夾襡上夾下蜀無絮長襦也文采鮮明光儀淑穆帶靈飛大綬腰分頭之劍頭上大華結上花下髻戴太真晨嬰之冠履玄璚鳳文之舄視之可年卅許修短得中天姿菴靄雲顔絶世真靈人也下車登牀帝拜跪問寒溫畢立如也因呼帝共坐帝南面向王母母自設膳膳精非常豐珍之肴芳華百果紫芝萎蕤華盛貌紛若填樏上音田下音螺清香之酒非地上所有甘氣殊絶帝不能名也又命侍女索桃須臾以鎜盛桃七枚大如鴨子形色青以呈王母母以四枚與帝自食三桃桃之甘美口有盈味帝食輒録核録留也母曰何謂帝曰欲種之耳母曰此桃三千歲一生實耳中夏地薄種之不生如何帝乃止於坐上酒觴數過王母乃命侍女王子登彈八琅之璈又命侍女董雙成吹雲和之笙又命侍女石公子擊昆庭之鐘又命侍女許飛瓊鼓震靈之簧侍女阮靈華拊五靈之石拊循也石如鳴球之類也侍女范成君擊洞庭之磬侍女段安香作九天之鈞於是衆聲徹朗靈音駭空又命侍女安法嬰歌玄靈之曲其詞曰大象雖寥廓我把天地户披雲沉靈輿倏忽適下士空洞成玄音至靈不容冶太真噓中唱始知風塵苦頤神三田中納精六闕下遂乘萬龍椿馳騁眄九野二曲曰玄圃遏北臺五城焕嵯峨啓彼無涯津泛此織女河仰上升絳庭下遊月窟阿顧眄八落外指招九雲遐忽已不覺勞豈寤少與多撫璈命衆女詠發感中和妙暢自然樂為此玄雲歌韶盡至韻存真音辭無邪歌畢帝乃下地叩頭自陳曰徹武帝自稱名受質不才沉淪流俗承禪先業遂羈世纍政事多闕兆民不和風雨失節五穀無實德澤不建寇盜四海黔首勞斃户口滅半當非其主積臯丘山然少好道仰慕靈仙未能棄祿委榮棲迹山林思絶塵餌罔知攸向且捨世尋真鑽啓無師歲月見及恆慮奄忽不圖天顔頓集今日下臣有幸得膽上聖是臣宿命合得度世願垂哀憐賜諸不悟得以奉承切己之教王母曰女音汝後同能賤榮樂卑耽虛味道自復佳耳然女情恣體欲淫亂過甚殺伐非法奢侈其性恣則裂身之車淫為破年之斧殺則響對奢則心爛欲則神隕聚穢命斷以子蕞在會切爾之身而宅滅形之殘盈尺之材攻以百仞之害欲此解脫三尸全身永久難可得也有似無翅之鶯願鼓翼天池朝生之蟲而樂春秋者哉若能蕩此衆亂撥穢易韻保神氣於絳府閉淫宫而開悟靜奢侈於寂室愛衆生而不危守兹道戒思乎靈味務施惠和練惜精氣棄却浮麗令百競速遊女行若斯之事將豈無倣佛也如其不爾無為抱石而濟長津矣帝跪受聖戒請事斯語養身之要既聞之矣然體非玉石而無主於恆氣非四時而常生於內政當率御出入呼吸中適和液得循形神靡錯氣既隨冝則魂𩲸不滯若使理合其分氣甄居延切察也其適則形可不枯宅可不廢昔受道書具以施業之矣遂不獲真驗未為巨益使精神疲於往來津液勞於出入歲減其始月虧其昔形亦漸凋神亦廢落是徹不得所奉於口訣開暗塞於明堂爾不審服御可以永久者吐納可以延年者乞賜長生之術暫悟於行尸之身若蒙聖誥於即日臣伏聽麗天之教矣王母曰昔先師元始天王時及間居登於藂霄之臺侍者天皇榑桑大帝君及九真諸王十方衆神仙官爰延弟子丹房之內説玄微之言因問我何為而欲索長存矣吾因避席叩頭請問長生之術天王登見遺以要言辭深旨幽實天人之玄觀上帝之奇祕女今日願聞之乎帝跪曰徹小醜賤生枯骨之餘敢以不肖之軀而慕龍鳳之年欲以朝花之質希晦朔之期雖樂遠流莫知以濟塗路堅塞所要無寄常恐一旦死於鑽仰之難取笑於世俗之夫豈圖今日遭遇光會一睹聖姿而精神飛揚恍惚大夢如以涉世千年救護死歸之日乞願垂哀誥賜徹元元王母曰將告女要言我曾聞天王曰夫欲長生者宜先取諸身但堅守三一保爾旅族金瑛夾草廣山黃木昌城玉蘂夜山火玉逮及鳳林鳴酢音醋西瑤瓊酒中華紫蜜北陵緑阜太上之藥風實雲子玉津金漿月精萬壽碧海琅菜蓬萊文醜濁河七榮動山高柳北采玄都之綺華仰漱雲山之朱蜜夜河天骨昆吾漆沫空洞靈瓜四劫一實宜陵麟膽炎山夜日東掇扶桑之丹椹俯探長河之文藻素虬童子九色鳳腦太真虹音芝天漠巨草南宫火碧西鄉扶老三梁龍華生子大道有得食之後天而老此太上之所服非中仙之所保其次藥有八光太和斑龍黑胎文虎白沫出于西丘七玄飛節九孔連珠雲漿玉酒玄圃瓊腴鐘山白膠玉屋青敷閬風石髓黑河珊瑚蒙山白鳳之肺靈丘蒼鸞之血東英朱菜九節交結太微嘉禾瓊華腦實流淵鯨眼赤河絳璧北汲太玄之酪中握二儀之脈雲瀆藂艾昆丘神雀廣夜草流淵青狄真陵雷精玄都平蓋左食神元右閬玄瀨上屈蘭圓之金精下摘圓丘之紫奈鸞水靈蛤八陔赤薤萬載一生流光九隊有得食之後天而逝此天帝之所服下仙之所逮其次藥有九丹金液紫華紅英太清九轉五雲之漿玄霜絳雪騰躍三黃東瀛白香炎洲飛生八石十威僖九光西流石膽東滄青錢高丘餘糧精石瓊田太虛還丹盛次金蘭長光緑草雲童飛干子得服之白日升天此飛仙之所服地仙之所見也其下藥有松柏之膏山薑沈精芻草澤瀉枸𣏌茯苓菖蒲門冬巨勝黃菁雲飛赤版桃膠朱英椒麻續斷萎蕤黃連如此下藥略舉其端草類繁多名有數千子得服之可以延年雖不長享無期上升青天亦能身生光澤還髮童顔役使羣鬼得為地仙要且録此有階漸尋遠勝也是以天官遠妙靈藥别品靈無竒挺真仙有域今不可謂呼吸六氣安在一身灌溉三宫近出阿庭淺薄其術棄而不為其大戇者也夫呼吸御精保明神氣足以精不脫則永久氣長存則不死既得其和其壽不已又復不用藥物之煩費營索之劬勞者也百姓日用故上品謂之自然者矣但不得遊乎十天飛我八外自得縱身於四域之內亦駐策衆靈焉夫始欲修之先營其氣太上真經所謂行益易之道益者益精易者易形能益能易名上仙籍不益不易不離死厄行益易者謂常思靈寶也靈者神也寶者精也子但受精握固閉氣吞液氣化血血化精精化液液化骨行之不倦神精充溢為之一年易氣二年易血三年易脈四年易肉音肉五年易髓六年易筋七年易骨八年易髮九年易形變化易形變化則道成道成則位為仙人吐納六氣口中甘香欲食靈存得其味微息挹吞從心所適氣者水也無所不成至柔之物通致神精矣此元始天王丹房之中微言所説今敕侍笈玉女李慶孫書出以相付子善録而循焉於是王母言粗畢嘯命靈官使駕龍嚴車欲去帝叩頭請留殷勤王母乃止王母乃遣侍女郭密香與上元夫人相問云王九光母敬謝但不相見四千餘年天事勞我致以愆面劉徹好道適來視之徹了了似可成進然形慢神穢腦血淫漏五藏不淳關胃彭勃骨無津液浮反外內肉多精少瞳子不夷三尸狡亂玄白失時語之至道殆恐非仙才吾久在人間實謂臭濁然時復可遊望以寫細念庸主對坐悒悒不樂夫人肯暫來否若能屈駕當停相須帝不知上元夫人何神人也又見侍女下殿俄失所在須臾郭侍女返上元夫人又遺侍女答相問云阿環再拜上問起居遠隔絳河擾以官事遂替顔色近五千年仰戀光潤情係無違密香至奉信承降尊於劉徹處聞命之際登當顛倒先被大帝君敕使詣玄洲校定天元正爾暫往如是當還還便束帶須臾少留帝因問上元夫人由王母曰是三天上元之官統領十方玉女之名録者也當二時許上元夫人至來時亦聞雲中簫鼓之聲既至從官文武千餘人皆女子年同十八九許形容明逸多服青衣光彩耀日真靈官也夫人可草餘天姿清輝靈眸絶朗著赤霜之袍雲彩亂色非錦非繡不可名字頭作三角髻餘髮散垂之至腰戴九靈夜光之冠帶六出火玉之珮垂鳳文琳華之綬腰流黃揮精之劍上殿向王母拜王母坐而止之呼同坐北向夫人設厨厨之精珍與王母所設者相似王母勑帝曰此真元之母尊貴之神女當起拜帝問寒溫還坐夫人笑曰五濁之人耽湎榮利嗜味淫色固其常也且徹以天子之貴其亂目者倍於常人焉而復於華麗之墟振根願無為之事良有志也王母日所謂有心哉上元夫人謂帝曰女好道乎聞數招方士祭山嶽祠靈神禱河川亦為勤矣面不獲者實有由也女胎性暴胎性奢胎性淫胎性酷胎性賊五者恆舍於榮衛之中五藏之內雖鋒鋩良針固難愈矣暴則使氣奔而神攻是故神擾而氣謁淫則使精漏而魂疲是故精謁而魂銷奢則使真離而魂穢是故本遊面靈臰酷則使喪仁而自攻是故失仁而服亂賊則使心鬭而口乾是故內戰而外絶五者皆是截身之刀鋸刳命之斧鉞雖復疲好於長生而不能遺兹五難亦何為損性面自勞乎然猶是得此小益以自知往爾若從今已捨爾五性反諸柔善明務察下慈務矜怨惠務濟窮賑務施勞念務存孤惜務及身恆為陰德救濟死厄亘久孜孜不泄精液於是閉諸淫養爾神放諸奢從至儉勤齋戒節飲食絶五穀去臰腥鳴天鼓飲玉漿蕩華池叩金梁按而行之當有翼爾今阿母迂天尊之重下降於蟪蛄之窟霄虛之靈而詣孤鳥之俎且阿母至戒妙唱玄發驗其敬勗節度明修所奉比及百年阿母必能致女於玄都之墟迎女於昆闕之中位以仙官遊邁十方吾言之畢矣子厲之哉若不能爾無所言矣帝下席跪謝曰臣受性凶頑生長亂濁面墻不啓無由開達然貪生畏死奉靈敬神今日受教此乃天也輒戢聖令以為身範是小醜之臣當獲生活唯垂哀護願賜元元夫人使帝還坐王母謂夫人曰卿之戒言言甚急切更使未解之人畏於至意夫人曰若其志道將以身投餓虎忘軀破滅蹈火履水固於一志必無憂也若其無忠志則心疑真信嫌惑之徒勿畏急言急言之發欲成其志耳阿母既有念必當賜以尸解之方耳王母曰此子勤心已久而不遇良師遂欲毁其正志當疑天下必無仙人是故發我閬宫暫舍塵濁既欲堅其仙志又欲令向化不惑也今日相見令人念之至於尸解下方吾甚不惜復三年吾必欲賜以成丹半劑石象策一具與之則徹不得復停當今胸奴未彌邊陲有事何必令其倉卒捨天下之尊而便入林岫也但當問篤向之志必卒何如如其回改吾方數來王母因撫帝背曰女用上元夫人至言必得長生可不勗勉帝跪曰徹書之金簡以身模之焉帝又見王母巾笈中有卷子小書盛以紫錦之囊帝問此書是仙靈之方邪不審其目可得膽眄王母出以示之曰此五嶽真形圖也昨青城諸仙就我求請當過以付之乃三天太上所出文祕禁極重豈女穢質所宜佩乎今且與汝靈光生經可以通神勸志也帝下地叩頭固請不已王母曰昔上皇清虛元年三天太上道君下觀六合膽河海之短長察丘嶽之高卑名立天柱安于地理植五嶽而擬諸鎮輔貴昆靈以舍靈仙尊蓬丘以館真人安水神乎極陰之源栖太帝乎榑桑之墟於是方丈之阜為理命之室滄浪海島養九老之堂祖瀛玄炎長元流生鳳麟聚窟各為洲名並在滄流大海玄津之中水則碧黑俱流波則振蕩羣精諸仙玉女聚於滄溟其名難測其實分明乃因山源之規矩睹河嶽之盤曲陵回阜轉山高壠長周旋委蛇形似書字是故因象制名定實之號畫形祕於玄臺而出為靈真之信諸仙佩之皆如傳章道士執之經行山川百神羣靈尊奉親迎女雖不正然數訪山澤叩求之志不忘于道欣子有心今以相與當深奉慎如事君父泄示凡夫必致禍考也上元夫人語帝曰阿母今以瓊笈妙藴發紫臺之文賜女八會之書五嶽真形可謂至珍且貴上帝之玄觀矣子自非受命合神弗見此文今雖得其真形觀其妙理而無五帝六甲左右靈飛之符太陰六丁通真遁虛玉女之籙太陽六戊招神天光策精之書左乙混沌東蒙之文右庚素收攝殺之律壬癸六遁隱地八術丙丁入火九赤班符六辛入金致黃水月華之法六巳石精金光藏影化形之方子午卯酉八稟十決六靈威儀丑辰未戌地真素訣長生紫書三五順行寅申巳亥紫度炎光內視中方凡闕此十二事者何以召山靈朝地神總攝萬精驅策百鬼來虎豹役蚊龍乎子所謂適知其一未見其他也帝下席叩頭曰徹下士濁民不識清真今日聞道是生命會遇聖母今當賜與真形修以度世夫人今告徹應須五帝六甲六丁六戊致靈之術既蒙啓發弘益無量唯原告誨濟臣飢渴得使已枯之木蒙靈陽之潤焦炎之草幸甘雨之溉不敢多陳願賜指授上元夫人曰我無此文也昔曾扶廣山見青真小童有此金書祕字云求道益命千端萬緒皆須五帝六甲靈飛之術六丁六壬名字之號得以請命延算長生久視驅策衆靈役使百神者也其無六甲要事唯守真形者於通靈之來必無階矣女有心可念故相告篇目耳幸復廣加搜訪焉帝固請不已叩頭流血上元夫人曰吾無此文所以相示十二事者欲令女廣尋博求以參真形之用耳王母乃告上元夫人曰夫真形寶文靈官所貴此子守求不已誓以必得故虧科禁特以與之然五帝六甲通真招神此術眇邈必當須精潔至誠殆非流濁所宜施行吾今既賜徹以真形夫人今當授以致靈之途矣吾嘗憶昔日與夫人共登玄壟朔野及曜真之山視王子童王子童乃就吾請求太上隱書吾以三元祕言不可傳泄於中仙夫人時亦有言見守助子童之言志矣吾既難違來意不獨執惜至於今日之事有以相似後造朱火丹陵食靈瓜其味甚好憶此未久而已七千歲矣夫人既已告徹篇目十二事畢必當匠而成之何緣令人主啓顙請乞叩頭流血邪上元夫人曰阿環不苟惜向不持來耳此是太虛羣文真人赤童所出傳之既自有男女之限禁又宜授得道者恐徹下才未應用此爾王母色不平乃曰若天禁漏泄犯違明科傳必其人授必知真者何緣夫人向下才而説靈飛之篇目乎妄言則漏妄説則泄説而不傳是謂衒天道此禁豈輕於傳也别勑三官司直推夫人之輕泄也吾之五嶽真形文乃太上天皇所出其文寶妙而為天仙之信豈復應下授之於劉徹也邪直以孜孜之心數請川嶽勤修齋戒以求神仙之應志在度世不遭明師故吾等有以下眄之耳至於教仙之術不復限惜而弗傳夫人但有致靈真之事足以卻不信之狂夫耳吾意在是矣然此子性氣淫暴服精不純何能得成真仙浮空參差十方乎勤而行之適足以不死耳明科所云非長生難也聞道難非聞道難也行之難非行之難也終之難良匠能與人規矩不能使人必巧明師能授人妙術不能使人必為何足其隱之也夫人不嘗憶問為長桑公子請吾求八光揮疾藥玉樹方乎上元夫人有慙色跪謝曰阿環昔初學道於廣都之丘建木丹誠術數未成之時倒景君無常先生此二人蓋太清玄和天之靈官也見授六甲左右靈飛方十二事初授之日二君告阿環曰初學道者聽四十年一傳得道者四百年一傳得仙者四千年一傳得真者四萬年一傳得升太上者四十萬年一傳女受傳女男受傳男太上科禁已表於昭生之符矣阿環受書已來凡傳六十八女子賢大女郎抱蘭即阿環之弟子也阿環所授者固不可以授男也伏見扶廣山青真小童往授太微中元君五帝六甲靈飛遁虛天光左右策精等方凡十二事與阿環所受者同文一無異也青真男官也未聞復有所授此子先是阿環學入火弟子今正勑取以授徹也先所以告徹篇目者意是愍其有心將欲堅其專氣今且廣求他日與之亦欲以男授男承科而行既勤而獲令知天真之珍貴非徒苟執衒泄天道矣本情如此阿環主臣願不罪焉阿母真形之妙靈人傳信天仙寶貴封之金臺佩入紫微乃經行而前衛門大虎却伏抱關出過太清則振身瑶房左遨滄海長揖東蒙右接常陽下盻版桐泛彼八海則乘蚪從龍遊此名山則衆真奉迎動有雲輪羽蓋靜可長存永安至術洪矣初不傳地官阿母今乃授於淫濁之尸賜於枯骨之身可謂太不宜矣况阿環有六甲下術唯驅策百靈致日月之華精藏匿形影化生萬物出入水火唾叱杳冥徹視反聽收束千精乘虎豹以驅馳采月華以長生隱淪八地回倒辰星久視輕身與天相傾耳安得及太上之靈書八會之奇文乎用之眇邈可以遊景靈之宫紛紛飆飆登流霞之堂臣五嶽之主挹蘂醴之觴駕九龍以虛騰落紫鴻而玄翔邪王母笑曰先失自可恕乎上元夫人即命侍女紀離容徑到扶廣山敕青真小童出六甲左右靈飛致神之方十二事來以授徹也須臾侍女還奉八色玉笈鳳文之藴玄光明曜真華煒煥云青真小童問訊弟子阿昌言向奉詣絳河攝南真七元君檢校羣龍猛獸之數事畢過門受教承阿母相邀詣劉徹家不意天靈至尊乃復下降於臭濁中也不審起居如何侍女紀離容至云尊欲得金書祕字六甲靈飛左右策精之文十二事輒封一通付徹雖有心求慕實非仙才詎宜以此術傳泄於行尸乎阿昌近在帝處見有上言者甚衆云山鬼哭於藂林孤魂號於絶域興師旅而族有功忘賞勞而刑士卒縱橫白骨奢擾黔首淫酷自恣罪已彰於太上怨已見於天氣囂言互聞必不得度世也真尊見勑不敢違耳王母笑曰言此子者誠多愆帝亦不必推也夫好道慕仙者精誠志念齋戒思愆輒除過一月剋己反善奉敬真神存真守一行此一月輒除過一年徹念道纍年齊亦勤積屢禱名山真靈願求度脫校計功過殆以相掩但自今已去勤修至誠奉上元夫人之言不宜復奢淫暴虐使萬兆勞殘怨𩲸窮鬼有破掘之訴流血之尸忘功賞之辭耳於是上元夫人離席起立手執八色玉笈鳳文之藴仰天向帝而祝曰九天浩洞太上曜靈神照玄寂清虛朗明登虛者妙守氣者牛至念道臻寂感真誠役神形辱安精年榮授徹靈飛及此六丁左右招神天光策精可以步虛可以隱形長牛久視還白留青我傳有四萬之紀授徹傳在四十之齡違犯泄漏必沉於幽冥必慎其禍敢告劉生爾師主是青童小君太上中黃道君之師真元始天王入室弟子也姓延陵名陽字庇華形有嬰孩之貌故仙官以青真小童之號其為器也環朗洞照聖周萬變玄鏡幽鑒才為真俊遊于扶廣權此始運宫館玄圃治仙職分子存師君從爾所願不存所授命必傾隕上元夫人祝畢乃一一手指所施用節度示帝第一篇有五帝六甲左右靈飛之符第二篇有六丁通真遁虛玉女之籙第三篇有太陽六戊招神天光策精之書第四篇有左乙混沌東蒙之文第五篇有右庚素收攝殺之律第六篇有壬癸六遁隱地八術之方第七篇有丙丁入火九赤班文之符第八篇有六辛入金致黃水月華之法第九篇有六巳石精金光藏影化形之方第十篇有子午卯酉八稟十訣六靈威儀第十一篇有辰戌丑未地真曲素之訣長生紫書地三五順行第十二篇有寅申己亥紫度炎光內視中方凡十二事都畢因復告帝曰夫五帝者方面之天精六甲六位之通靈太陰有潛空之妙遁靈履機之神秋含春挺千真之牛動則寂應成波靜則川陵緬平所以毫末不移浩嶽可傾赫哉太陽之招神策萬靈而驅馳六戊飛而神暢天光因景以揚暉西鄉激電而砰磕東桑空震以成雷蓋陽靈之日丙赫實九天之元威左乙混洞萬物始通陽微其升蒼暉應龍輕雲揚景飆胎潛風神眇集於有宅真感應而必鍾萬春回始是為東蒙右庚素秋斂散聚氣攝萬神而我役白虎動以彭勃少女起而通真延九天之眄視金精地靈來為身衛馘彼邪惡故稱攝殺之律壬癸六遁沉淪無根藏蔽萬鋒移行丘山隱地匿影崩流塞川八術六奇萬勝常全佩我六遁久視長存丙丁入火凌煙雲漠九赤龍書翳蔚朗煥爾用斑符致千靈以朝謁乃由丙神回丹火以衝散炎光上術妙乎異觀六辛入金飛害銷磨致日精得陽光之珠求月𩲸獲黃水之華能致八石之靈菌能引扶桑之丹霞酣雲漿於丹庭騰碧川於玄河其用少矣有益蓋多佩此六辛必造我家六巳石精金液流光變化萬端千載孰當佩我六巳易形遊行長生畢天無復始終元哉已書甚要難衝子午卯酉大神四界方面峙鎮八稟十訣降靈之來必由齋祭萬事取成於精愼千神求通於此術知我名字天人可致丑辰未戌地真之符遊行五嶽當用紫書曲素訣辭可以凌虛三五順行與靈同車寅申巳亥可禳飛災紫度炎光內視反聽神辭通達六甲收攝地司遊天踐地與真不疑夫此十二事者上帝封於玄景之臺子其祕慎之焉王母曰此皆太靈羣文並三天太上所撰或三皇天真所造校定或九天父母真人赤童所出此輩書符藏之於紫陵之臺隱以靈壇之房封以華琳之函藴以蘭簡之帛約以北羅之素印以太帝之璽諸名真貴靈下遊山川看林岫以眇視察有心之學夫或告之以道德或傳之以天符諸學道未成者受此書文聽四十年授一人如無其人八十年可頓授二人得道者四百年授一人無其人八百年併授二人得仙者四千年授一人知無其人八千年可頓授二人得真者四萬年授一人如無其人八萬年頓授二人升太上者四十萬年授一人傳非其人是為泄天道可授而不傳是為閉天寶不計限而妄授者是為輕天老受而不敬是為慢天藻泄閉輕慢四者取死之刀斧延禍之車乘也泄之者身死道路受土形而骸裂閉則目盲耳聾於來生命凋枉而卒沒輕則鍾禍於父母詣玄都而考罰慢則暴終而墮惡道生棄疾於後世復有愈兹罪者則宗斷而族滅同道謂之天親同心謂之地愛為道者當相親授共均榮辱營守真一珍惜精液恭養和氣氣全神歸必齊靈會如其不爾天降爾癘此皆道之科禁今故相誡不可不慎然此法宜傳但當以年限齊之爾若便有其人不必須限訖而授之也汝欲授五嶽真形者董仲舒似其人也欲行六甲靈飛左右之符者可傳李少君此二人得道者也王母又命侍女宋靈賔更取一圖與帝靈賔探懷中得一卷盛以雲錦之囊形書精明俱如向巾器中者王母起立手以付帝又祝曰天高地卑五嶽鎮形元津激氣滄澤玄精天回九道六和長平太上八會飛天之成真仙節信由兹通靈泄墜滅腐實歸長生徹其慎之敢告劉生祝畢授帝帝拜稽首王母曰夫始學道符者宜别祭五嶽諸仙真靈潔齋而佩之今亦以六甲雜事須用節度相與可明依案之也若女遂剋明正身反惡修善復三年七月更來告女要道也須臾殿南朱雀窗中忽有一人來窺看仙官帝驚問何人王母曰女不識此人邪是女侍郎東方朔是我鄰家小兒也性多滑稽曾三來偷此桃此子昔為太上使令到方丈助三天司命收録仙家朔到方丈但務山水遊戲了不共營和氣擅弄雷電激波揚風風雨失時陰陽錯忤致今蛟鯨陸行山崩境壞海水暴竭黃鳥宿淵妨農藝田沉湎玉酒失部御之和虧奉命之科於是九源丈人乃言之於太上太上遂謫斥使在人間去太清之朝令處臰濁之鄉近金華山二仙人及九疑君比為陳乞以行原之於是帝乃知朔非世俗之徒也時酒酣周宴言請粗畢上元夫人自彈雲林之璈鳴絃駭調清音靈朗玄風四發乃歌步玄之曲辭曰昔涉玄真道騰步登太霞負笈造天關借問太上家忽過紫微垣真人列如麻渌景清飆起靈蓋映朱葩蘭宫敞琳闕碧空啓璚沙丹臺結空構暐暐生光華飛鳳踶甍峙燭龍倚委蛇玉胎來絳九色紛相拏挹景練仙骸萬劫方童牙誰言壽有終扶桑不為查王母又命侍女田四飛答歌曰晨登太霞宫挹此八玉蘭夕入玄元闕采蘂掇琅玕濯足匏瓜河織女立津盤吐納挹景雲味之當一餐紫微何濟濟璚輪復朱丹朝發汗漫府暮宿句陳垣去去道不同且各體所安二儀設猶存奚疑億萬椿莫與世人説行尸言此難歌畢因告武帝仙官從者姓名及冠帶執佩物名所以得知而紀焉至明旦王母别去上元夫人謂帝曰夫李少君者專念精進理妙微密必得道矣其似未有六甲靈飛之文女當可以示之帝曰諾於是夫人與王母同乘而去臨發人馬龍虎威儀如初來時雲氣勃蔚盡為香氣極望西南良久乃絶於是帝既見王母及上元夫人乃信天下有神仙之事亦有欲去世計數矣而淫色恣性殺伐不休兆人怨於勞役死者怨於無辜其年作甘泉宫通天臺長安蜚廉館朝鮮王攻遼東都尉乃募天下死罪擊朝鮮八月甘泉宫內生草九莖詔曰甘泉宫中産芷九莖聯葉上帝博臨不異下房賜朕弘休其大赦天下賜雲陽都百户牛酒作房之歌至元封三年春作角觗戲三百人至元封四年又行幸雍祠五畤至元封五年行內守至於盛唐祠虞舜于九疑登灊山天柱山春三月還至泰山增封甲子祠高祖于明堂以配上帝因朝諸侯王元封六年行幸回中作首山宫三月行幸河東詞后土又先以元封二年七月七日西王母上元夫人下降於武帝王母授帝五嶽真形圖靈光生經上元夫人授六甲靈飛招真十二事王母及上元夫人見帝之日多所稱説或延年之訣致神靈之法或乘虛之數步玄之術諸要妙辭帝乃自撰為一卷及所授真形經書六甲靈飛之事帝乃盛以黃金之箱封以白玉之函珊瑚為軸紫錦為幃囊安著柏梁臺上數自齋戒整衣服親詣朝拜燒香盥潄然後執省之焉帝自受書已來出入六年意旨自暢高韻自許云以為神真見降必當度世強悍氣力不修至誡乃興起臺館勞弊百姓坑殺降卒遠征夷狄路盈怨嘆流血臯城每事不從王母之深言上元夫人之妙誡王母遂不復來也到太初元年十一月乙酉天火燒柏梁臺於是真形圖者凡四卷共函燒失王母嘗以武帝不能從訓故以火災之耳但帝先承王母言以元封三年七月齋戒以五嶽真形圖授董仲舒登受帝又承上元夫人言以元封四年七月齋戒以五帝六甲靈飛十二事授李少君登寫受此書得傳行於世者先傳此二君以存矣帝既失書悔不行德自知道喪其後東方朔一旦乘雲龍飛去同時衆人見從西北上再仰望大霧覆之不知所在帝愈懊惱其年禪蒿里祠后土東臨渤海望祠蓬萊仰天自誓重要靈應而終無感春還受計於甘泉二月起建章宫夏五月正曆以正月為歲首色尚黃數用五定官名協律吕此本王母意也至太初二年三月行幸河東祠后土以太初三年正月行幸東巡海上夏四月還修封泰山以太初四年起明光宫改號天漢元年正月行幸河東祠后土至天漢二年春行幸東海還幸回中三月行幸泰山修封祠明堂至太始三年五月行幸東海山稱萬歲冬賜行所道户錢五千餘鰥寡孤獨者人帛一匹太始四年三月行幸泰山祠西王母求靈應征和四年春行幸東萊臨大海清齋祀王母上元夫人求應亦不得還行幸泰山修封庚寅祀于明堂改號後元元年正月行幸甘泉宫效泰畤秋七月地震湧泉二年春朝諸侯王於甘泉宫賜宗室二月帝疾行幸盩厔五祚宫丁卯帝崩入殯未央前殿三月葬茂陵山陵之夕帝棺自動而有聲聞宫外如此數過又有芳香之氣異常陵畢於是墳埏間大霧門壞霧經一月許日帝冢中先有一玉箱一玉杖此二物是帝所蓄用者忽出在世間人見其志告之有司有司詰辭買者乃商人也從關外來詣郿市見一人於北車卷賣此二物責素三十匹錢九萬即售之度實不知賣箱杖主名昨來洛市因見詰此二物事實如辭有司以聞二物簿入官遺商人勿問帝未崩時先詔以雜書四十餘卷常所讀玩者使隨身斂於棺內至延康二年河東功曹李友入上黨抱犢山採藥於嚴室中得所葬之書盛以金箱書卷後題東觀臣姓名記書月日武帝時侍臣有典書郎冉登見書及箱流涕曰此是孝武皇帝殯殮時物也臣時料以著棺中不知何緣得出耳宣帝大愴然驚愕以書又付武帝廟中其茂陵安完如故而書箱玉杖忽出地外又物尚鮮盛無點汙也見之者亦甚惑不能名之矣按九都龍真經云得仙之下者皆先死過太陰中練尸骸度地户然後乃得尸解去耳按武帝箱杖雜書先並隨身入槨乃從無間忽然顯出貨杖於市書見山室自非神變幽妙孰有如此者乎明武帝之死尚未可知應運靈化又王莽篡位到地皇二年莽使通祭漢家諸陵言符瑞之意使者到茂陵聞地中大噫吒而長嘆者四使者悚怖以聞莽莽曰武帝當恨吾祠祭之晚耳又特更祭以太牢
